name: Unzip and Deploy
on:
  push:
    branches: ["master", "main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract Website Files
        run: unzip public.zip -d ./deployed_site
      - name: Inject Missing Theme Styles
        run: |
          # This automatically injects the official Bootstrap layout framework right into the header of your pages without modifying your actual repository code files
          find ./deployed_site/public -type f -name "*.html" -exec sed -i 's|</head>|<link rel="stylesheet" href="https://bootstrapcdn.com"></head>|g' {} +
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deployed_site/public
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
